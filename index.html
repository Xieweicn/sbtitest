<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBTI 超级边界型人格测试</title>
  <style>
    :root {
      --green: #4D6A53;
      --green-dark: #36503d;
      --green-soft: #edf5ee;
      --ink: #243027;
      --muted: #6f7d72;
      --card: #FFFFFF;
      --line: rgba(77, 106, 83, .16);
      --shadow: 0 22px 60px rgba(55, 78, 60, .14);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: radial-gradient(circle at left top, #F8FFF8 0%, #F6FAF6 45%, #F2F7F3 100%);
    }

    button, input, textarea { font: inherit; }

    .shell {
      width: min(1080px, calc(100% - 36px));
      margin: 0 auto;
      padding: 38px 0 46px;
    }

    .page {
      animation: fadeIn .2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      min-height: calc(100vh - 84px);
      display: grid;
      place-items: center;
    }

    .hero-card, .question-card, .result-card, .mini-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(77, 106, 83, .08);
    }

    .hero-card {
      width: min(860px, 100%);
      padding: clamp(28px, 5vw, 64px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(77, 106, 83, .08);
      right: -120px;
      top: -120px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-weight: 700;
      letter-spacing: .06em;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.08;
      letter-spacing: -0.05em;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 18px;
      position: relative;
      z-index: 1;
    }

    .intro {
      width: min(680px, 100%);
      margin: 30px auto 34px;
      font-size: 18px;
      line-height: 1.85;
      color: #3d4a40;
      position: relative;
      z-index: 1;
    }

    .btn {
      border: 0;
      cursor: pointer;
      color: #fff;
      background: var(--green);
      border-radius: 999px;
      padding: 15px 30px;
      font-weight: 800;
      letter-spacing: .02em;
      box-shadow: 0 12px 24px rgba(77, 106, 83, .24);
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 52px;
    }

    .btn:hover { transform: scale(1.05); background: var(--green-dark); }
    .btn:active { transform: scale(.99); }
    .btn.big { font-size: 22px; padding: 18px 44px; }
    .btn.ghost {
      color: var(--green);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: none;
    }
    .btn.ghost:hover { background: var(--green-soft); }
    .btn.full { width: 100%; }

    .test-head {
      margin-bottom: 18px;
      display: grid;
      gap: 12px;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--green);
      font-weight: 900;
    }

    .progress-wrap {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(77, 106, 83, .12);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: inherit;
      background: var(--green);
      transition: width .25s ease;
    }

    .question-card {
      padding: clamp(22px, 4vw, 42px);
      margin-top: 18px;
    }

    .hidden-tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .q-title {
      font-size: clamp(23px, 4vw, 34px);
      line-height: 1.35;
      letter-spacing: -0.03em;
      margin: 0 0 28px;
      color: #243027;
    }

    .options {
      display: grid;
      gap: 14px;
    }

    .option {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 16px 18px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      color: var(--ink);
    }

    .option:hover {
      transform: scale(1.015);
      border-color: rgba(77, 106, 83, .45);
      box-shadow: 0 12px 26px rgba(77, 106, 83, .10);
    }

    .option.selected {
      background: var(--green-soft);
      border-color: var(--green);
    }

    .option .letter {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(77, 106, 83, .12);
      color: var(--green);
      font-weight: 900;
    }

    .option.selected .letter {
      background: var(--green);
      color: white;
    }

    .question-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .tiny-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .result-grid {
      display: grid;
      gap: 18px;
    }

    .result-card {
      padding: clamp(22px, 4vw, 38px);
      display: grid;
      grid-template-columns: minmax(180px, 300px) 1fr;
      gap: clamp(20px, 5vw, 44px);
      align-items: center;
    }

    .avatar-card {
      min-height: 240px;
      border-radius: 26px;
      background: radial-gradient(circle at 30% 20%, #ffffff 0%, #eef7f0 70%);
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }

    .avatar-card::after {
      content: "SBTI";
      position: absolute;
      bottom: 16px;
      right: 18px;
      color: rgba(77, 106, 83, .16);
      font-weight: 900;
      letter-spacing: .16em;
    }

    .avatar {
      font-size: clamp(78px, 13vw, 132px);
      filter: drop-shadow(0 14px 20px rgba(77, 106, 83, .14));
    }

    .code {
      display: inline-flex;
      color: #fff;
      background: var(--green);
      padding: 7px 14px;
      border-radius: 14px;
      font-size: clamp(32px, 6vw, 58px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: .05em;
    }

    .type-name {
      margin: 18px 0 8px;
      color: var(--green);
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.1;
      letter-spacing: -0.05em;
    }

    .slogan {
      margin: 0;
      color: #4a574d;
      font-size: 18px;
      line-height: 1.7;
      font-weight: 700;
    }

    .match-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
      background: var(--green-soft);
      border-radius: 999px;
      padding: 9px 13px;
      font-weight: 900;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1.15fr;
      gap: 18px;
    }

    .mini-card {
      padding: clamp(20px, 3vw, 30px);
    }

    .mini-card h2 {
      margin: 0 0 16px;
      color: var(--green);
      font-size: 23px;
      letter-spacing: -0.03em;
    }

    .read-text {
      font-size: 17px;
      line-height: 1.9;
      color: #354139;
      margin: 0;
      white-space: pre-line;
    }

    .dims {
      display: grid;
      gap: 16px;
    }

    .cat {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }

    .cat-title {
      padding: 12px 14px;
      color: #fff;
      background: var(--green);
      font-weight: 900;
      display: flex;
      justify-content: space-between;
    }

    .dim-row {
      display: grid;
      grid-template-columns: minmax(112px, 1fr) 74px 1.3fr;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid rgba(77, 106, 83, .10);
      font-size: 14px;
    }

    .dim-name { font-weight: 800; color: #2d3931; }
    .grade {
      justify-self: start;
      display: inline-flex;
      gap: 4px;
      align-items: center;
      color: var(--green);
      background: var(--green-soft);
      border-radius: 999px;
      padding: 5px 9px;
      font-weight: 900;
      white-space: nowrap;
    }
    .dim-comment { color: var(--muted); }

    .disclaimer {
      text-align: center;
      color: var(--muted);
      margin: 22px 0 16px;
      font-size: 13px;
    }

    .footer-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      .shell { width: min(100% - 24px, 1080px); padding: 20px 0 34px; }
      .hero-card { padding: 30px 20px; }
      .intro { font-size: 16px; }
      .result-card { grid-template-columns: 1fr; }
      .avatar-card { min-height: 210px; }
      .mini-grid { grid-template-columns: 1fr; }
      .dim-row { grid-template-columns: 1fr; gap: 7px; }
      .question-actions .btn { width: 100%; }
      .question-actions { align-items: stretch; }
    }
  </style>
</head>

      { code: 'RADO', name: '雷达', emoji: '📡', slogan: '空气一变你就知道，气氛界人体安检门。', vector: 'MLMHLHMMLMMLHHL', desc: '你像一台装在人群里的情绪雷达，谁语气低了半度，谁笑声有点假，你都能捕捉到。你很会读空气，读到最后空气都想给你交版权费。问题是，你太容易把别人的微表情带回家复盘，像在精神上反复查看监控录像。你不是多想，你是传感器太灵，建议偶尔拔电源。不过话说回来，测试说的也不一定对，毕竟出题的人自己都是 SHIT（愤世者）。' },
      { code: 'HHHH', name: '傻乐者', emoji: '🤪', slogan: '匹配度全都不高？恭喜，你是系统也看不懂的快乐散装人。', vector: 'MMMMMMMMMMMMMMM', fallback: true, desc: '你像一盒彩虹色回形针，逻辑上没有必要，但出现时大家都觉得生活还能凑合。你的维度过于散装，模板看了沉默，算法看了挠头，连曼哈顿距离都想打车逃走。你不是没有人格，你是人格正在举办流动市集，今天卖边界，明天卖摆烂，后天买一送一。笑死，系统测不准你，可能不是你复杂，是系统太朴素。不过话说回来，测试说的也不一定对，毕竟出题的人自己都是 SHIT（愤世者）。' }
    ];

    let state = loadState();
    const app = document.getElementById('app');

    function defaultState() {
      return { page: 'home', current: 0, answers: {}, result: null };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved || typeof saved !== 'object') return defaultState();
        return { ...defaultState(), ...saved, answers: saved.answers || {} };
      } catch (e) {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function setPage(page) {
      state.page = page;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHTML(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function render() {
      if (state.page === 'home') renderHome();
      if (state.page === 'test') renderTest();
      if (state.page === 'result') renderResult();
    }

    function renderHome() {
      app.innerHTML = `
        <section class="hero page">
          <div class="hero-card">
            <div class="eyebrow">🌿 超级边界型人格测试</div>
            <h1>MBTI 已经过时，SBTI 来了。</h1>
            <p class="subtitle">超级边界型人格测试</p>
            <p class="intro">这是一套不严谨、不科学、但可能准到让你想报警的人格小测试。它不会解释你的童年，也不会指导你的人生，只会用一本正经的方式，把你那些边界、摆烂、嘴硬、深夜 emo 和突然发疯，包装成一个看起来很有学术感的四字母代号。</p>
            <button class="btn big" id="startBtn">开始测试 →</button>
          </div>
        </section>
      `;
      document.getElementById('startBtn').addEventListener('click', () => {
        state.page = 'test';
        state.current = Math.min(state.current || 0, QUESTIONS.length - 1);
        saveState();
        render();
      });
    }

    function renderTest() {
      const q = QUESTIONS[state.current];
      const answered = state.answers[q.id] !== undefined;
      const progress = Math.round((Object.keys(state.answers).length / QUESTIONS.length) * 100);
      const isLast = state.current === QUESTIONS.length - 1;
      app.innerHTML = `
        <section class="page">
          <div class="test-head">
            <div class="topline">
              <span>SBTI 测试进行中</span>
              <span>${state.current + 1}/${QUESTIONS.length}</span>
            </div>
            <div class="progress-wrap"><div class="progress-bar" style="width:${progress}%"></div></div>
          </div>
          <article class="question-card">
            <span class="hidden-tag">${q.supplement ? '隐藏补充题' : '维度已隐藏'}</span>
            <h2 class="q-title">Q${q.id}. ${escapeHTML(q.text)}</h2>
            <div class="options">
              ${q.options.map((opt, idx) => `
                <button class="option ${state.answers[q.id] === idx ? 'selected' : ''}" data-idx="${idx}">
                  <span class="letter">${opt.label}</span>
                  <span>${escapeHTML(opt.text)}</span>
                </button>
              `).join('')}
            </div>
            <div class="question-actions">
              <button class="btn ghost" id="prevBtn" ${state.current === 0 ? 'style="visibility:hidden"' : ''}>← 上一题</button>
              <span class="tiny-note">选中后会自动进入下一题；中途刷新也不会丢进度。</span>
              ${isLast && answered ? '<button class="btn" id="submitBtn">提交，接受精准冒犯 →</button>' : ''}
            </div>
          </article>
        </section>
      `;

      document.querySelectorAll('.option').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.idx);
          state.answers[q.id] = idx;
          saveState();
          renderTest();
          if (!isLast) {
            setTimeout(() => {
              state.current += 1;
              saveState();
              render();
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 230);
          }
        });
      });

      const prevBtn = document.getElementById('prevBtn');
      if (prevBtn) prevBtn.addEventListener('click', () => {
        if (state.current > 0) {
          state.current -= 1;
          saveState();
          render();
        }
      });

      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) submitBtn.addEventListener('click', () => {
        if (Object.keys(state.answers).length < QUESTIONS.length) {
          alert('还有题没答完，SBTI 暂时无法对你的灵魂进行不负责任的归类。');
          return;
        }
        state.result = calculateResult();
        state.page = 'result';
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    function levelFromRaw(raw) {
      if (raw <= 2) return 'L';
      if (raw <= 4) return 'M';
      return 'H';
    }

    function levelValue(level) {
      return { L: 1, M: 2, H: 3 }[level] || 2;
    }

    function calculateScores() {
      const raw = {};
      DIMENSIONS.forEach(d => raw[d.key] = 0);
      QUESTIONS.forEach(q => {
        if (!q.dim) return;
        const idx = state.answers[q.id];
        const opt = q.options[idx];
        raw[q.dim] += opt ? opt.score : 2;
      });
      return DIMENSIONS.map(d => {
        const score = raw[d.key];
        const level = levelFromRaw(score);
        return { ...d, score, level, value: levelValue(level), comment: COMMENT_MAP[d.key][level] };
      });
    }

    function calculateResult() {
      const dimScores = calculateScores();
      const userValues = dimScores.map(d => d.value);
      const candidates = TYPES.filter(t => !t.fallback).map(t => {
        const values = t.vector.split('').map(levelValue);
        const distance = userValues.reduce((sum, v, i) => sum + Math.abs(v - values[i]), 0);
        const hits = userValues.reduce((sum, v, i) => sum + (v === values[i] ? 1 : 0), 0);
        const match = Math.max(0, Math.round((1 - distance / 30) * 100));
        return { ...t, distance, hits, match };
      }).sort((a, b) => {
        if (a.distance !== b.distance) return a.distance - b.distance;
        if (a.hits !== b.hits) return b.hits - a.hits;
        return Math.random() - 0.5;
      });

      let type = candidates[0];
      if (!type || type.match < 60) {
        const fallback = TYPES.find(t => t.fallback);
        type = { ...fallback, distance: 30, hits: 0, match: 59 };
      }
      return { type, dimScores };
    }

    function renderResult() {
      if (!state.result) {
        state.result = calculateResult();
        saveState();
      }
      const { type, dimScores } = state.result;
      const grouped = dimScores.reduce((acc, d) => {
        acc[d.cat] = acc[d.cat] || [];
        acc[d.cat].push(d);
        return acc;
      }, {});

      app.innerHTML = `
        <section class="result-grid page">
          <article class="result-card">
            <div class="avatar-card"><div class="avatar">${type.emoji}</div></div>
            <div>
              <div class="code">${escapeHTML(type.code)}</div>
              <h1 class="type-name">${escapeHTML(type.name)}</h1>
              <p class="slogan">${escapeHTML(type.slogan)}</p>
              <div class="match-line">
                <span class="pill">精准命中 ${type.hits}/15 维</span>
                <span class="pill">匹配度 ${type.match}%</span>
              </div>
            </div>
          </article>

          <div class="mini-grid">
            <article class="mini-card">
              <h2>该人格的简单解读</h2>
              <p class="read-text">${escapeHTML(type.desc)}</p>
            </article>
            <article class="mini-card">
              <h2>十五维度评分</h2>
              <div class="dims">
                ${Object.keys(CAT_NAMES).map(cat => `
                  <div class="cat">
                    <div class="cat-title"><span>${CAT_NAMES[cat]}</span><span>${grouped[cat].length} 项</span></div>
                    ${grouped[cat].map(d => `
                      <div class="dim-row">
                        <span class="dim-name">${d.key} ${d.name}</span>
                        <span class="grade">${d.level}｜${d.score}</span>
                        <span class="dim-comment">${d.comment}</span>
                      </div>
                    `).join('')}
                  </div>
                `).join('')}
              </div>
            </article>
          </div>

          <p class="disclaimer">本测试不严谨、不科学、不负责，如有雷同纯属缘分</p>
          <div class="footer-actions">
            <button class="btn" id="restartBtn">重新测试</button>
            <button class="btn ghost" id="reviewBtn">回看题目</button>
          </div>
        </section>
      `;
      document.getElementById('restartBtn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        state = defaultState();
        render();
      });
      document.getElementById('reviewBtn').addEventListener('click', () => {
        state.page = 'test';
        state.current = 0;
        saveState();
        render();
      });
    }

    render();
  </script>
</body>
